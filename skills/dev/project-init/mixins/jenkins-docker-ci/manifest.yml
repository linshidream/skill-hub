# jenkins-docker-ci mixin —— CI 类型：Jenkins + Docker（P0 唯一收敛的 ci）
# 未来 k8s 作为 mixins/k8s-ci/ 扩展（替换 deploy 段，不碰 template 层）
name: jenkins-docker-ci
description: Jenkins pipeline + Docker 镜像构建部署

# ci profile 提供的变量（registry/namespace 等由交互问答或实施方案文档填入）
variables:
  registry: "REPLACE_WITH_DOCKER_REGISTRY"           # 如 registry.example.com
  namespace.test: "REPLACE_WITH_NAMESPACE_TEST"       # 如 example-test
  namespace.prod: "REPLACE_WITH_NAMESPACE_PROD"       # 如 example-prod
  jenkins.job: "REPLACE_WITH_JENKINS_JOB"             # 如 example-pipeline
  gitee.credential.id: "REPLACE_WITH_GITEE_CREDENTIAL_ID"
  maven.settings.file.id: "REPLACE_WITH_MAVEN_SETTINGS_FILE_ID"
  docker.creds.id: "REPLACE_WITH_DOCKER_REGISTRY_CREDENTIAL_ID"
  git.repo.url: "REPLACE_WITH_GIT_REPO_URL"           # 如 https://gitee.com/<your-org>/<your-repo>.git
  deploy.root: "/opt/app"   # 部署根目录，run.sh/rollback.sh 的 CONFIG_DIR/LOG_DIR 前缀；表单第20项可覆盖，运行时 DEPLOY_ROOT env 再覆盖

# Java 版本贯穿：构建镜像与运行镜像由 project-type 的 java.version 驱动
# java8  -> maven:3-alpine            / openjdk:8-jre-alpine
# java21 -> maven:3.9-eclipse-temurin-21 / eclipse-temurin:21-jre-alpine
java-images:
  "8":  { build: "maven:3-alpine",                 run: "openjdk:8-jre-alpine" }
  "21": { build: "maven:3.9-eclipse-temurin-21",  run: "eclipse-temurin:21-jre-alpine" }

provides:
  files:
    - {from: files/Dockerfile.tmpl,                to: "deploy/docker/Dockerfile"}
    - {from: files/build.sh.tmpl,                  to: "deploy/docker/build.sh"}
    - {from: files/run.sh.tmpl,                    to: "deploy/docker/run.sh"}
    - {from: files/rollback.sh.tmpl,               to: "deploy/docker/rollback.sh"}
    - {from: files/Jenkinsfile.tmpl,               to: "deploy/jenkins/Jenkinsfile"}
    - {from: files/scripts/check-build-ready.sh.tmpl, to: "scripts/check-build-ready.sh"}
    - {from: files/scripts/push-remote.sh.tmpl, to: "scripts/push-remote.sh"}
    - {from: files/scripts/compress-old-logs.sh.tmpl, to: "scripts/compress-old-logs.sh"}
    - {from: files/docs/checklist/build-readiness.md.tmpl, to: "docs/checklist/build-readiness.md"}
